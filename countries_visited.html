<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=travel.html#map-section">
<title>Travel Map | Ramya Hebbalaguppe</title>
<style>
  :root { --ink:#283044; --muted:#657084; --paper:#fffaf6; --accent:#7fa6c7; --line:rgba(127,166,199,.25); --shadow:0 18px 50px rgba(45,58,78,.14); }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(217,233,245,.95), transparent 34rem), radial-gradient(circle at top right, rgba(248,223,208,.78), transparent 32rem), linear-gradient(135deg,#fffaf6 0%,#f7fbff 55%,#fff8f3 100%); padding:24px; }
  .card { max-width:680px; background:rgba(255,255,255,.86); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); padding:34px; text-align:center; }
  h1 { margin:0 0 10px; font-size:clamp(30px,5vw,48px); letter-spacing:-.04em; }
  p { color:var(--muted); line-height:1.7; }
  a { display:inline-block; margin-top:12px; padding:11px 16px; border-radius:999px; background:#fff; border:1px solid var(--line); color:#496f91; font-weight:800; text-decoration:none; }
</style>
</head>
<body>
  <main class="card">
    <h1>Travel map has moved</h1>
    <p>The countries-visited map is now merged with the photo gallery into one polished travel page.</p>
    <a href="travel.html#map-section">Open merged travel page</a>
  </main>
</body>
</html>
